<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun! 🎉</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            --accent-color: #ff80ab;
            --text-color: #880e4f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .card {
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: white;
            text-shadow: 3px 3px 0px var(--accent-color);
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }

        .photo-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
        }

        /* VIDEO */
        .profile-video {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(255, 128, 171, 0.3);
            position: relative;
            z-index: 2;
        }

        .photo-glow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: white;
            filter: blur(15px);
            opacity: 0.6;
            z-index: 1;
            animation: pulseGlow 3s infinite;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            cursor: pointer;
            width: 200px;
        }

        .btn-balloon {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-music {
            background-color: white;
            color: var(--accent-color);
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            opacity: 0.7;
            animation: flyUp 8s linear infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulseGlow {
            0%,100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes flyUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120vh); }
        }
    </style>
</head>

<body>

<div id="balloon-container"></div>

<div class="card">
    <h1>Selamat Ulang Tahun 🎉</h1>
    
    <div class="photo-container">
        <div class="photo-glow"></div>

        <!-- VIDEO GANTI FOTO -->
        <video class="profile-video" autoplay loop muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>

    </div>

    <div class="btn-group">
        <button class="btn-balloon" onclick="createBalloon(5)">Klik untuk Balon 🎈</button>
        <button class="btn-music" onclick="toggleMusic()">Play Music 🎵</button>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
const container = document.getElementById('balloon-container');
const colors = ['#FFC1CC','#FF80AB','#E1BEE7'];

function createBalloon(num){
    for(let i=0;i<num;i++){
        const b=document.createElement('div');
        b.className='balloon';
        b.style.width='40px';
        b.style.height='50px';
        b.style.left=Math.random()*100+'vw';
        b.style.background=colors[Math.floor(Math.random()*colors.length)];
        container.appendChild(b);
        setTimeout(()=>b.remove(),8000);
    }
}

const music=document.getElementById('bgMusic');

function toggleMusic(){
    music.paused?music.play():music.pause();
}
</script>

</body>
</html>
